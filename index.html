<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f0f4f8;
  margin: 0;
  padding: 40px;
}

#app {
  max-width: 650px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}

textarea {
  width: 90%;
  height: 120px;
  padding: 10px;
  font-size: 16px;
}

button {
  margin-top: 15px;
  padding: 10px 18px;
  font-size: 16px;
}

#results {
  margin-top: 25px;
  text-align: left;
  white-space: pre-wrap;
}
</style>
</head>

<body>
  <div id="app">
    <h1>RunFit AI</h1>
    <p>Describe your usual running route, and RunFit AI will suggest shoes, training tips, and injury-risk notes.</p>

    <textarea id="routeInput" placeholder="Example: I usually run 4 miles on pavement with some hills. It often rains where I live, and I sometimes get shin splints."></textarea>

    <br>

    <button onclick="analyzeRoute()">Analyze My Run</button>

    <div id="results"></div>
  </div>

<script>
async function analyzeRoute() {
  const input = document.getElementById("routeInput");
  const results = document.getElementById("results");
  const routeDescription = input.value;

  results.innerHTML = "Analyzing your route...";

  const response = await fetch("/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: routeDescription
    })
  });

  const data = await response.json();

  results.innerHTML = data.reply;
}
</script>

</body>
</html>
